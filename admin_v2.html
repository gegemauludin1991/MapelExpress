<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - MapelExpress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FAFAFA;
            overflow: hidden; 
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }
        .shadow-soft { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
        .menu-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-item.active { 
            background: linear-gradient(90deg, #EFF6FF 0%, #FFFFFF 100%); 
            color: #2563EB; 
            border-left: 4px solid #2563EB;
            font-weight: 700;
        }
    </style>
</head>
<body class="flex h-screen w-full relative antialiased text-gray-800">

    <aside id="sidebar" class="fixed md:relative w-72 h-full bg-white shadow-soft flex flex-col z-[9999] transform -translate-x-full md:translate-x-0 transition-transform duration-300 border-r border-gray-100">
        <div class="p-6 border-b border-gray-50 flex items-center justify-between mt-2">
            <div class="flex items-center gap-3">
                <div class="bg-blue-50 p-2.5 rounded-2xl">
                    <svg class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight">
                    <span class="text-blue-600">Mapel</span><span class="text-red-600">Express</span>
                </h1>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 flex flex-col gap-1">
            <p class="px-8 py-2 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Pusat Kendali</p>
            <a href="#" class="menu-item flex items-center gap-3 px-8 py-3.5 text-sm font-semibold text-gray-500 hover:bg-gray-50 hover:text-blue-600">
                <span class="text-xl">🛰️</span> God Eye Radar
            </a>
            <a href="#" class="menu-item flex items-center gap-3 px-8 py-3.5 text-sm font-semibold text-gray-500 hover:bg-gray-50 hover:text-blue-600">
                <span class="text-xl">📋</span> Dispatcher Order
            </a>
            <a href="#" class="menu-item active flex items-center gap-3 px-8 py-3.5 text-sm font-semibold text-gray-500 hover:bg-gray-50 hover:text-blue-600">
                <span class="text-xl">🏪</span> Setup Ekspedisi
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full w-full relative bg-gray-100">
        <header class="h-20 glass-panel shadow-sm flex items-center justify-between px-6 z-[5000] absolute top-0 left-0 right-0">
            <div class="flex items-center gap-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800 leading-tight">Setup Titik Ekspedisi</h2>
                    <p class="text-xs font-semibold text-gray-500">Manajemen Lokasi Drop-off & Integrasi Kurir</p>
                </div>
            </div>
        </header>

        <div class="flex-1 w-full h-full bg-[#E2E8F0] relative overflow-hidden pt-20">
            <div id="eks-map" class="absolute inset-0 w-full h-full z-0"></div>

            <div class="absolute top-24 left-6 right-6 md:right-auto md:w-[400px] z-[900] flex flex-col gap-4 pointer-events-none">
                <div class="glass-panel rounded-2xl shadow-soft flex items-center p-2 pointer-events-auto border border-white/50">
                    <div class="pl-3 pr-2 text-gray-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
                    <input type="text" placeholder="Cari alamat area..." class="flex-1 bg-transparent border-none outline-none text-sm font-semibold text-gray-700 placeholder-gray-400">
                    <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-700 shadow-md">Cari</button>
                </div>
            </div>

            <div class="absolute bottom-6 left-6 right-6 md:left-auto md:right-6 md:translate-x-0 md:w-[400px] glass-panel z-[4000] rounded-[32px] shadow-2xl border border-white/50 flex flex-col overflow-hidden pointer-events-auto">
                <div class="px-8 pt-6 pb-4 text-center border-b border-gray-100/50">
                    <h3 class="font-extrabold text-gray-800 text-lg">Setup Titik Ekspedisi</h3>
                    <p class="text-[11px] font-semibold text-gray-500 mt-1">Tap lokasi di peta, lalu simpan cabang baru.</p>
                </div>

                <div class="px-8 py-6 flex flex-col gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nama Cabang / Gerai</label>
                        <input type="text" id="f-eks-nama" placeholder="Cth: J&T Pusat Dipatiukur" class="w-full mt-1 bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-sm font-bold text-gray-800 outline-none focus:border-blue-500 shadow-sm">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Latitude</label>
                            <input type="text" id="f-eks-lat" readonly placeholder="-6.xxx" class="w-full mt-1 bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-bold text-gray-400 outline-none cursor-not-allowed">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Longitude</label>
                            <input type="text" id="f-eks-lng" readonly placeholder="107.xxx" class="w-full mt-1 bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-bold text-gray-400 outline-none cursor-not-allowed">
                        </div>
                    </div>

                    <button onclick="window.simpanEkspedisi()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl mt-2 hover:bg-blue-700 hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <span>💾</span> Simpan Titik ke Database
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/db.js"></script>
    <script src="/js/admin_final.js?v=9999"></script> 
</body>
</html>
