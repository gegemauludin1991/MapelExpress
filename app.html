<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapelExpress - Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative h-screen w-full flex flex-col overflow-hidden">

    <header class="absolute top-0 left-0 w-full bg-white/95 backdrop-blur-md z-[5000] px-4 py-3 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="/assets/icons/logome.png" class="w-10 h-10 object-contain">
            <div>
                <h1 class="font-black text-xl leading-tight"><span class="text-blue-800">Mapel</span><span class="text-red-600">Express</span></h1>
                <p class="text-[11px] font-bold text-gray-500" id="header-greeting">Hai, bosku! 👋</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-notif-customer" class="w-10 h-10 bg-gray-50 border border-gray-200 rounded-full flex items-center justify-center relative hover:bg-gray-100">
                <span id="cust-notif-dot" class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full animate-ping hidden"></span>
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            </button>
            <button id="btn-profile" class="w-10 h-10 bg-gray-50 border border-gray-200 rounded-full flex items-center justify-center hover:bg-gray-100">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            </button>
        </div>
    </header>

    <div class="absolute top-20 left-4 right-4 z-[4000]">
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-1 relative">
            <button onclick="window.swapLokasi()" class="absolute right-4 top-1/2 -translate-y-1/2 z-10 bg-white border border-gray-200 p-2 rounded-full shadow-sm hover:bg-gray-50">
                <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
            </button>
            <div class="flex items-center px-4 py-3 border-b border-gray-100 relative">
                <span class="w-3 h-3 bg-blue-500 rounded-full mr-3 flex-shrink-0"></span>
                <input type="text" id="input-jemput" readonly placeholder="Mencari GPS..." class="w-full text-sm font-bold text-gray-800 outline-none bg-transparent pr-8 truncate cursor-pointer" onclick="document.getElementById('btn-pick-jemput').click()">
            </div>
            <div class="flex items-center px-4 py-3 relative">
                <span class="w-3 h-3 bg-red-500 rounded-sm mr-3 flex-shrink-0"></span>
                <input type="text" id="input-tujuan" readonly placeholder="Pilih Tujuan / Ekspedisi..." class="w-full text-sm font-bold text-gray-500 outline-none bg-transparent pr-8 truncate cursor-pointer" onclick="document.getElementById('btn-pick-tujuan').click()">
            </div>
        </div>
    </div>

    <div id="map" class="absolute inset-0 w-full h-full z-0"></div>

    <div id="center-pin-overlay" class="fixed inset-0 z-[4500] pointer-events-none hidden flex flex-col items-center justify-center">
        <div class="relative -mt-10">
            <div id="set-lokasi-dot" class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-blue-500 shadow-lg border-2 border-white"></div>
            <svg id="svg-pin-overlay" class="w-12 h-12 drop-shadow-xl" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path id="pin-bg" d="M12 21.5C12 21.5 20.5 15.8333 20.5 9.5C20.5 4.80558 16.6944 1 12 1C7.30558 1 3.5 4.80558 3.5 9.5C3.5 15.8333 12 21.5 12 21.5Z" fill="#2563EB"/>
                <circle cx="12" cy="9.5" r="3.5" fill="white"/>
            </svg>
        </div>
        <div id="set-lokasi-card" class="absolute bottom-8 w-[90%] max-w-sm bg-white p-4 rounded-2xl shadow-2xl border border-gray-100 pointer-events-auto transition-opacity duration-300 opacity-0 flex flex-col gap-3">
            <div class="flex items-start gap-3">
                <div class="mt-1 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div>
                <div class="flex-1"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">LOKASI TERPILIH</p><p id="set-lokasi-title" class="text-sm font-bold text-gray-800 leading-tight">Mencari lokasi...</p></div>
            </div>
            <div class="flex gap-2 mt-1">
                <button onclick="window.exitPickingMode()" class="w-1/3 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl text-sm active:scale-95 transition-transform">Batal</button>
                <button id="btn-set-lokasi" class="w-2/3 bg-gray-800 text-white font-bold py-3 rounded-xl text-sm active:scale-95 transition-transform shadow-md">Set Lokasi</button>
            </div>
        </div>
    </div>

    <button id="btn-my-location" class="absolute bottom-[220px] right-4 z-[4000] bg-white p-3 rounded-full shadow-lg border border-gray-100 text-blue-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
    </button>

    <div id="bottom-sheet" class="absolute bottom-0 left-0 w-full bg-white z-[5000] rounded-t-[30px] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] transition-transform duration-300">
        <div id="sheet-handle" class="w-full pt-4 pb-2 flex justify-center cursor-pointer">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        <div class="p-5 pt-2 pb-8 max-h-[70vh] overflow-y-auto hide-scrollbar">
            
            <div id="section-pilih-ekspedisi">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-gray-800 text-base">Kirim Kemana Hari Ini?</h3>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button id="btn-pick-jemput" class="hidden"></button>
                    <button id="btn-pick-tujuan" class="bg-red-50 border border-red-100 p-4 rounded-2xl text-left shadow-sm active:scale-95 transition-transform">
                        <div class="bg-red-500 w-8 h-8 rounded-full flex items-center justify-center text-white mb-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
                        <h4 class="font-black text-red-800 text-sm">Alamat Personal</h4>
                        <p class="text-[10px] text-red-600/70 font-bold mt-0.5">Kirim ke Rumah/Kantor</p>
                    </button>
                    <button onclick="window.bukaDaftarEkspedisi()" class="bg-blue-50 border border-blue-100 p-4 rounded-2xl text-left shadow-sm active:scale-95 transition-transform">
                        <div class="bg-blue-600 w-8 h-8 rounded-full flex items-center justify-center text-white mb-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg></div>
                        <h4 class="font-black text-blue-800 text-sm">Gerai Ekspedisi</h4>
                        <p class="text-[10px] text-blue-600/70 font-bold mt-0.5">Drop paket J&T, JNE, dll</p>
                    </button>
                </div>
                <div id="list-semua-ekspedisi" class="hidden gap-2 pb-4"></div>
            </div>

            <div id="section-form-order" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="window.batalPilihEkspedisi()" class="bg-gray-100 p-2 rounded-full text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">TUJUAN PENGIRIMAN</p>
                        <h3 id="label-tujuan-form" class="font-black text-gray-800 text-base">Nama Tujuan</h3>
                    </div>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 mb-4">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Detail Barang</p>
                    <input type="text" id="form-nama" placeholder="Nama / Jenis Barang (Contoh: Sepatu)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold text-sm mb-3 outline-none">
                    <div class="flex gap-3 items-center">
                        <input type="number" id="form-berat" placeholder="Estimasi Berat (KG)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold text-sm outline-none">
                        <span id="label-jarak-rute" class="bg-blue-100 text-blue-800 font-black text-xs px-3 py-3 rounded-xl whitespace-nowrap">Jarak: - KM</span>
                    </div>
                </div>
                <button id="btn-pesan-kurir" class="w-full bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform flex justify-center items-center gap-2">
                    Pesan Kurir Sekarang <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>

        </div>
    </div>

    <div id="backdrop-overlay" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] hidden transition-opacity" onclick="window.closeAllModals()"></div>

    <div id="modal-cust-notif" class="fixed bottom-0 left-0 w-full bg-gray-50 z-[10000] rounded-t-[30px] h-[85vh] transform translate-y-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="bg-white p-5 rounded-t-[30px] border-b border-gray-100 flex justify-between items-center shadow-sm">
            <div><h2 class="text-xl font-black text-gray-800">Notifikasi</h2><p class="text-[11px] font-bold text-gray-400">Pembaruan status pesananmu</p></div>
            <button onclick="window.closeAllModals()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-4" id="cust-notif-list"></div>
    </div>

    <div id="modal-cust-profile" class="fixed top-0 right-0 w-[85%] max-w-sm bg-white z-[10000] h-full transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
        <div class="p-6 bg-blue-600 text-white rounded-bl-[40px] relative overflow-hidden shadow-lg">
            <button onclick="window.closeAllModals()" class="absolute top-4 right-4 bg-white/20 p-2 rounded-full backdrop-blur-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div class="w-16 h-16 bg-white rounded-full border-4 border-blue-400 flex items-center justify-center text-blue-600 font-black text-2xl mb-4 shadow-inner mt-4">C</div>
            <h2 id="profile-name-text" class="text-2xl font-black mb-1 drop-shadow-sm">Customer</h2>
            <p id="profile-email-text" class="text-xs text-blue-100 font-bold mb-1 opacity-90">Memuat email...</p>
            <p id="profile-wa-text" class="text-xs text-blue-100 font-bold opacity-90">Memuat WA...</p>
        </div>
        <div class="p-6 flex-1 bg-gray-50">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4">
                <button onclick="window.hubungiAdmin()" class="w-full flex items-center justify-between p-4 border-b border-gray-100 active:bg-gray-50"><div class="flex items-center gap-3"><div class="bg-green-50 text-green-600 p-2 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg></div><span class="font-bold text-gray-700 text-sm">Hubungi Admin / Bantuan</span></div><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
                <button onclick="window.handleLogout()" class="w-full flex items-center justify-between p-4 active:bg-gray-50"><div class="flex items-center gap-3"><div class="bg-red-50 text-red-600 p-2 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></div><span class="font-bold text-red-600 text-sm">Keluar (Logout)</span></div><svg class="w-4 h-4 text-red-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
            </div>
        </div>
    </div>

    <script src="./js/MapEngine.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
