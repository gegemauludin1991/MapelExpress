<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapelExpress - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #F8FAFC; overflow: hidden; }
        .animate-zoom-out { animation: zoomOutIcon 4s cubic-bezier(0.25, 1, 0.3, 1) forwards; }
        @keyframes zoomOutIcon { 0% { transform: scale(1.5); opacity: 0; } 20% { transform: scale(1); opacity: 1; } 85% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.85); opacity: 0; } }
        .animate-slide-text { animation: slideText 4s cubic-bezier(0.25, 1, 0.3, 1) forwards; display: inline-block; }
        @keyframes slideText { 0% { transform: translateX(-100vw); opacity: 0; } 20% { transform: translateX(0); opacity: 1; } 85% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(100vw); opacity: 0; } }
        .splash-fade-out { animation: fadeOut 0.5s forwards; pointer-events: none; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        .form-slide-in { animation: slideIn 0.6s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="relative h-screen w-full flex items-center justify-center">

    <div id="splash-screen" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center overflow-hidden">
        <img src="/assets/icons/logome.png" class="w-40 h-40 object-contain animate-zoom-out drop-shadow-xl">
        <div class="mt-4 w-full flex justify-center">
            <h1 class="font-black text-3xl tracking-tight animate-slide-text drop-shadow-sm">
                <span class="text-blue-800">Mapel</span><span class="text-red-600">Express</span>
            </h1>
        </div>
    </div>

    <main class="w-full max-w-md p-6 relative z-10 hidden" id="auth-container">
        <div class="text-center mb-8">
            <img src="/assets/icons/logome.png" class="h-16 mx-auto mb-3">
            <h2 class="text-2xl font-black text-gray-800" id="auth-title">Selamat Datang!</h2>
            <p class="text-sm text-gray-500 font-bold mt-1" id="auth-subtitle">Masuk untuk mulai mengirim paket.</p>
        </div>

        <div id="form-login" class="space-y-5">
            <input type="email" id="login-email" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 font-bold outline-none" placeholder="Email">
            <input type="password" id="login-pass" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 font-bold outline-none" placeholder="Password">
            <button onclick="prosesLogin()" id="btn-login" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 text-lg">Masuk</button>
            
            <div class="flex items-center gap-3 py-2">
                <div class="h-px bg-gray-200 flex-1"></div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Atau</span>
                <div class="h-px bg-gray-200 flex-1"></div>
            </div>
            <button onclick="loginGoogle()" class="w-full bg-white border border-gray-200 font-bold py-3.5 rounded-xl shadow-sm flex items-center justify-center gap-3">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google
            </button>
            <p class="text-center text-sm font-bold text-gray-500 mt-6">Belum punya akun? <button onclick="toggleForm('register')" class="text-blue-600 font-bold">Daftar</button></p>
        </div>

        <div id="form-register" class="space-y-4 hidden">
            <input type="text" id="reg-nama" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold outline-none" placeholder="Nama Lengkap">
            <input type="number" id="reg-wa" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold outline-none" placeholder="WA: 0812...">
            <input type="email" id="reg-email" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold outline-none" placeholder="Email">
            <input type="password" id="reg-pass" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 font-bold outline-none" placeholder="Password">
            <button onclick="prosesDaftar()" id="btn-register" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 text-lg">Buat Akun</button>
            <p class="text-center text-sm font-bold text-gray-500 mt-6">Sudah punya akun? <button onclick="toggleForm('login')" class="text-blue-600 font-bold">Masuk</button></p>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://nahgibyegdeioquryfde.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5haGdpYnllZ2RlaW9xdXJ5ZmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODM3NjksImV4cCI6MjA5NDE1OTc2OX0.NeN2uqRTKEJyc0SOEIV5iUQIIOGf88A46KRJffGUKmQ';
        
        // PERBAIKAN 2: Cara memanggil createClient yang benar menggunakan destructuring
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        setTimeout(() => {
            document.getElementById('splash-screen').classList.add('splash-fade-out');
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('auth-container').classList.add('form-slide-in');
            }, 500);
        }, 3800);

        function toggleForm(t) {
            document.getElementById('form-login').classList.toggle('hidden', t === 'register');
            document.getElementById('form-register').classList.toggle('hidden', t === 'login');
        }

        async function prosesLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            
            // Hardcode Admin Check
            if(email === 'MapelEx@admin' && pass === 'mapel2026') return window.location.href = '/admin.html';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) return alert("Login Gagal!");
            window.location.href = '/app.html';
        }

        async function loginGoogle() {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/app.html' } });
        }

        async function prosesDaftar() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nama = document.getElementById('reg-nama').value;
            const wa = document.getElementById('reg-wa').value;

            const { data, error } = await supabase.auth.signUp({ email, password: pass });
            if (error) return alert(error.message);
            if (data.user) {
                await supabase.from('profiles').insert([{ id: data.user.id, full_name: nama, whatsapp: wa }]);
                alert("Berhasil! Silakan Login.");
                toggleForm('login');
            }
        }
    </script>
</body>
</html>
