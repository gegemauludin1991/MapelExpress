<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapelExpress - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #F8FAFC; overflow: hidden; margin: 0; }
        
        /* Splash Screen Layer */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        .animate-zoom-out { animation: zoomOutIcon 2s ease-in-out forwards; }
        @keyframes zoomOutIcon { 0% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="relative h-screen w-full">

    <div id="splash-screen">
        <div class="animate-zoom-out mb-4">
            <img src="./assets/logo.png" alt="Logo" class="w-24 h-24 object-contain" onerror="this.src='https://via.placeholder.com/100?text=MAPEL'">
        </div>
        <h1 class="text-2xl font-black text-gray-800 tracking-tighter">MAPEL<span class="text-blue-600">EXPRESS</span></h1>
    </div>

    <div id="main-content" class="hidden h-full w-full flex flex-col p-6 justify-center">
        <div id="login-form" class="">
            <h2 class="text-3xl font-black text-gray-800 mb-2">Selamat Datang!</h2>
            <p class="text-gray-500 mb-8">Masuk ke akun MapelExpress lu</p>
            
            <input type="email" id="log-email" placeholder="Email" class="w-full mb-4 p-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" id="log-pass" placeholder="Password" class="w-full mb-6 p-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button id="btn-login" onclick="prosesLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Masuk Sekarang</button>
            
            <p class="text-center mt-8 text-gray-600 text-sm">
                Belum punya akun? <span onclick="toggleForm('reg')" class="text-blue-600 font-bold cursor-pointer">Daftar</span>
            </p>
        </div>

        <div id="reg-form" class="hidden">
            <h2 class="text-3xl font-black text-gray-800 mb-2">Buat Akun</h2>
            <p class="text-gray-500 mb-6">Lengkapi data diri lu</p>
            
            <input type="text" id="reg-nama" placeholder="Nama Lengkap" class="w-full mb-3 p-4 rounded-2xl bg-gray-100 border-none outline-none">
            <input type="email" id="reg-email" placeholder="Email Aktif" class="w-full mb-3 p-4 rounded-2xl bg-gray-100 border-none outline-none">
            <input type="password" id="reg-pass" placeholder="Buat Password" class="w-full mb-3 p-4 rounded-2xl bg-gray-100 border-none outline-none">
            <input type="number" id="reg-wa" placeholder="No. WhatsApp (Contoh: 0812...)" class="w-full mb-6 p-4 rounded-2xl bg-gray-100 border-none outline-none">
            
            <button id="btn-register" onclick="prosesDaftar()" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">Buat Akun</button>
            
            <p class="text-center mt-6 text-gray-600 text-sm">
                Sudah ada akun? <span onclick="toggleForm('login')" class="text-blue-600 font-bold cursor-pointer">Masuk</span>
            </p>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase (Sesuaikan dengan data lu)
        const SUPABASE_URL = 'https://nahgibyegdeioquryfde.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Gunakan Key Lu yang Lengkap
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        // Cek apakah supabase berhasil diload
        if (!supabase) {
            console.error("Gagal memuat Supabase SDK. Cek koneksi internet.");
        }

        // Jalankan transisi splash screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const main = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.classList.add('hidden');
                    main.classList.remove('hidden');
                }, 500);
            }, 3000); // Tampil splash 3 detik
        });

        function toggleForm(type) {
            const login = document.getElementById('login-form');
            const reg = document.getElementById('reg-form');
            if(type === 'reg') {
                login.classList.add('hidden');
                reg.classList.remove('hidden');
            } else {
                reg.classList.add('hidden');
                login.classList.remove('hidden');
            }
        }

        async function prosesLogin() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            const btn = document.getElementById('btn-login');

            if(!email || !pass) return alert("Isi dulu email sama password-nya bro!");

            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
                if (error) throw error;
                
                window.location.href = './app.html';
            } catch (err) {
                alert("Login Gagal: " + err.message);
                btn.innerText = "Masuk Sekarang";
                btn.disabled = false;
            }
        }

        async function prosesDaftar() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const nama = document.getElementById('reg-nama').value;
            const wa = document.getElementById('reg-wa').value;
            const btn = document.getElementById('btn-register');

            if(!email || !pass || !nama || !wa) return alert("Semua data wajib diisi!");

            btn.innerText = "Mendaftarkan...";
            btn.disabled = true;

            try {
                const { data, error } = await supabase.auth.signUp({ email, password: pass });
                if (error) throw error;

                if (data.user) {
                    await supabase.from('profiles').insert([{ id: data.user.id, full_name: nama, whatsapp: wa }]);
                    alert("Pendaftaran Berhasil! Silakan login.");
                    toggleForm('login');
                }
            } catch (err) {
                alert("Gagal Daftar: " + err.message);
            } finally {
                btn.innerText = "Buat Akun";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
